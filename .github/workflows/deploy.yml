name: Deploy Odin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, gaia]
    env:
      OLLAMA_BASE_MODEL: qwen3.5:9b
      OLLAMA_MODEL_NAME: local-model:latest
      OLLAMA_CONTEXT_LENGTH: 16384
      HERMES_CONTEXT_LENGTH: 131072
      AGENT_MODEL: deepseek-v4-pro
      CHAT_MODEL: local-model:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Secrets
        env:
          LLDAP_LDAP_USER_PASS: ${{ secrets.LLDAP_LDAP_USER_PASS }}
        run: |
          chmod +x scripts/ensure_secret.sh
          
          # Resolve the external LLDAP password secret name from Cerberus
          echo "LLDAP_LDAP_USER_PASS_NAME=$(echo "$LLDAP_LDAP_USER_PASS" | ./scripts/ensure_secret.sh cerberus_lldap_user_pass)" >> $GITHUB_ENV

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.tienzo.net
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_RAW_PASSWORD }}

      - name: Deploy Stack
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          OBSIDIAN_VAULT_PATH: ${{ vars.OBSIDIAN_VAULT_PATH }}
          LLDAP_LDAP_BASE_DN: ${{ vars.LLDAP_LDAP_BASE_DN }}
          LLDAP_LDAP_USER_PASS_NAME: ${{ env.LLDAP_LDAP_USER_PASS_NAME }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ALLOWED_USERS: ${{ vars.DISCORD_ALLOWED_USERS }}
          MUNINN_MASTER_KEY: ${{ secrets.MUNINN_MASTER_KEY || 'sk-muninn-insecure-master-key' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          API_SERVER_KEY: ${{ secrets.API_SERVER_KEY }}
          REGISTRY_PREFIX: ${{ vars.REGISTRY_PREFIX }}
          MNEMOSYNE_LLM_ENABLED: ${{ vars.MNEMOSYNE_LLM_ENABLED }}
          MNEMOSYNE_LLM_BASE_URL: ${{ vars.MNEMOSYNE_LLM_BASE_URL }}
          MNEMOSYNE_LLM_MODEL: ${{ vars.MNEMOSYNE_LLM_MODEL }}
        run: |
          # Generate config files from templates using environment variables
          python3 -c "import os; open('config/hermes/config.yaml', 'w').write(os.path.expandvars(open('config/hermes/config.yaml.template').read()))"
          python3 -c "import os; open('config/muninn/config.yaml', 'w').write(os.path.expandvars(open('config/muninn/config.yaml.template').read()))"
          
          # Write config files and fix permissions on host directories (UID 1000, GID 1000)
          docker run --rm -v /opt/odin/mnemosyne:/opt/mnemosyne alpine sh -c "chown -R 1000:1000 /opt/mnemosyne && chmod 775 /opt/mnemosyne"
          docker run --rm -i -v /opt/odin/hermes:/opt/data alpine sh -c "mkdir -p /opt/data && cat > /opt/data/config.yaml && chown -R 1000:1000 /opt/data && chmod -R 775 /opt/data && chmod 664 /opt/data/config.yaml" < config/hermes/config.yaml
          
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh "odin" docker-compose.yml
