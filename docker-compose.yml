services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    configs:
      - source: ollama_init_script
        target: /init.sh
    environment:
      - OLLAMA_DEBUG=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_BASE_MODEL=${OLLAMA_BASE_MODEL}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME}
      - HERMES_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-16384}
      - OLLAMA_NUM_THREADS=${OLLAMA_NUM_THREADS:-}
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_QUEUE=512
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - internal
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  muninn-db:
    image: postgres:16-alpine
    volumes:
      - muninn-db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=muninn_user
      - POSTGRES_PASSWORD=muninn_password_secret_db_pass
      - POSTGRES_DB=muninn_db
    networks:
      - internal
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  muninn:
    image: ghcr.io/berriai/litellm-database:main-latest
    configs:
      - source: muninn_config
        target: /app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${MUNINN_MASTER_KEY}
      - DATABASE_URL=postgresql://muninn_user:muninn_password_secret_db_pass@muninn-db:5432/muninn_db
      - LITELLM_SALT_KEY=muninn_salt_secret_key_hash
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    command: ["--config", "/app/config.yaml"]
    networks:
      - internal
      - aether-net
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.muninn.rule=Host(`muninn.${DOMAIN_NAME}`)"
        - "traefik.http.routers.muninn.entrypoints=websecure"
        - "traefik.http.routers.muninn.tls=true"
        - "traefik.http.routers.muninn.tls.certresolver=cloudflare"
        - "traefik.http.services.muninn.loadbalancer.server.port=4000"
        - "traefik.docker.network=aether-net"
        - "homepage.group=Odin"
        - "homepage.name=Muninn Dashboard"
        - "homepage.icon=litellm.png"
        - "homepage.href=https://muninn.${DOMAIN_NAME}/ui"
        - "homepage.description=Ollama Prompt & Response Observability"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    volumes:
      - open-webui_data:/app/backend/data
    environment:
      - ENABLE_OLLAMA_API=False
      # LDAP Configuration
      - ENABLE_LDAP=true
      - LDAP_SERVER_HOST=cerberus_lldap
      - LDAP_SERVER_PORT=3890
      - LDAP_USE_TLS=false
      - LDAP_APP_DN=uid=admin,ou=people,${LLDAP_LDAP_BASE_DN}
      - LDAP_SEARCH_BASE=ou=people,${LLDAP_LDAP_BASE_DN}
      - LDAP_ATTRIBUTE_FOR_USERNAME=uid
      - LDAP_ATTRIBUTE_FOR_MAIL=mail
      - ENABLE_PERSISTENT_CONFIG=false
      - ENABLE_FOLLOW_UP_GENERATION=False
      - DEFAULT_MODELS=${CHAT_MODEL}
      - OPENAI_API_BASE_URLS=http://muninn:4000/v1;http://huginn-gateway:8642/v1
      - OPENAI_API_KEYS=${MUNINN_MASTER_KEY};${API_SERVER_KEY:-insecure_default_key_change_me}
      - WEBUI_SECRET_KEY_FILE=/run/secrets/odin_webui_secret_key
    entrypoint: [ "bash", "-c", "if [ -f /run/secrets/odin_lldap_user_pass ]; then export LDAP_APP_PASSWORD=$$(cat /run/secrets/odin_lldap_user_pass); fi; exec bash start.sh" ]
    secrets:
      - odin_lldap_user_pass
      - odin_webui_secret_key
    networks:
      - aether-net
      - internal
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.odin-webui.rule=Host(`odin.${DOMAIN_NAME}`)"
        - "traefik.http.routers.odin-webui.entrypoints=websecure"
        - "traefik.http.routers.odin-webui.tls=true"
        - "traefik.http.routers.odin-webui.tls.certresolver=cloudflare"
        - "traefik.http.services.odin-webui.loadbalancer.server.port=8080"
        - "traefik.docker.network=aether-net"
        - "homepage.group=Odin"
        - "homepage.name=Odin Chat"
        - "homepage.icon=open-webui.png"
        - "homepage.href=https://odin.${DOMAIN_NAME}"
        - "homepage.description=Local LLM Chat Interface"

  huginn-gateway:
    image: ${REGISTRY_PREFIX}hermes-agent:${STACK_NAME:-latest}
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    user: "0:0"
    command: /entrypoint.sh
    volumes:
      - /opt/odin/hermes:/opt/data
      - /opt/odin/mnemosyne:/opt/data/.hermes/mnemosyne
      - ${OBSIDIAN_VAULT_PATH}:/app/vault:rw
    environment:
      - TZ=Pacific/Auckland
      - OPENAI_BASE_URL=http://muninn:4000/v1
      - OPENAI_API_KEY=${MUNINN_MASTER_KEY}
      - AGENT_MODEL=${AGENT_MODEL}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-insecure_default_key_change_me}
      - GATEWAY_ALLOW_ALL_USERS=true
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS}
      - HERMES_CONTEXT_LENGTH=${HERMES_CONTEXT_LENGTH}
      - HERMES_API_TIMEOUT=1800
      - HERMES_STREAM_READ_TIMEOUT=1800
      - HERMES_STREAM_STALE_TIMEOUT=1800
      - HERMES_UID=1000
      - HERMES_GID=1000
      - SEARXNG_URL=http://searxng:8080
      - CAMOFOX_URL=http://camofox:9377
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MNEMOSYNE_DB_PATH=/opt/data/.hermes/mnemosyne/data/mnemosyne.db
      - MNEMOSYNE_DATA_DIR=/opt/data/.hermes/mnemosyne/data
      - MNEMOSYNE_LLM_ENABLED=${MNEMOSYNE_LLM_ENABLED:-true}
      - MNEMOSYNE_LLM_BASE_URL=${MNEMOSYNE_LLM_BASE_URL:-http://muninn:4000/v1}
      - MNEMOSYNE_LLM_API_KEY=${MUNINN_MASTER_KEY}
      - MNEMOSYNE_LLM_MODEL=${MNEMOSYNE_LLM_MODEL:-deepseek-v4-flash}
      - GIT_USER_NAME=${HERMES_GIT_USER_NAME}
      - GIT_USER_EMAIL=${HERMES_GIT_USER_EMAIL}
      - GH_SETUP_TOKEN=${GH_TOKEN:-}
      - GH_CONFIG_DIR=/opt/data/.config/gh
    secrets:
      - source: hermes_ssh_key
        target: hermes_ssh_key
    networks:
      - internal
      - aether-net
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Router for Huginn API (Port 8642)
        - "traefik.http.routers.huginn-api.rule=Host(`agent.${DOMAIN_NAME}`)"
        - "traefik.http.routers.huginn-api.entrypoints=websecure"
        - "traefik.http.routers.huginn-api.tls=true"
        - "traefik.http.routers.huginn-api.tls.certresolver=cloudflare"
        - "traefik.http.routers.huginn-api.service=huginn-api"
        - "traefik.http.services.huginn-api.loadbalancer.server.port=8642"
        - "traefik.docker.network=aether-net"

  huginn-dashboard:
    image: ${REGISTRY_PREFIX}hermes-agent:${STACK_NAME:-latest}
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint: ["/entrypoint.sh", "dashboard"]
    volumes:
      - /opt/odin/hermes:/opt/data
      - /opt/odin/mnemosyne:/opt/data/.hermes/mnemosyne
    environment:
      - TZ=Pacific/Auckland
      - GATEWAY_HEALTH_URL=http://huginn-gateway:8642
      - API_SERVER_KEY=${API_SERVER_KEY:-insecure_default_key_change_me}
      - OPENAI_BASE_URL=http://muninn:4000/v1
      - OPENAI_API_KEY=${MUNINN_MASTER_KEY}
      - AGENT_MODEL=${AGENT_MODEL}
      - HERMES_CONTEXT_LENGTH=${HERMES_CONTEXT_LENGTH}
      - HERMES_API_TIMEOUT=1800
      - HERMES_STREAM_READ_TIMEOUT=1800
      - HERMES_STREAM_STALE_TIMEOUT=1800
      - HERMES_UID=1000
      - HERMES_GID=1000
      - MNEMOSYNE_DB_PATH=/opt/data/.hermes/mnemosyne/data/mnemosyne.db
      - MNEMOSYNE_DATA_DIR=/opt/data/.hermes/mnemosyne/data
      - MNEMOSYNE_LLM_ENABLED=${MNEMOSYNE_LLM_ENABLED:-true}
      - MNEMOSYNE_LLM_BASE_URL=${MNEMOSYNE_LLM_BASE_URL:-http://muninn:4000/v1}
      - MNEMOSYNE_LLM_API_KEY=${MUNINN_MASTER_KEY}
      - MNEMOSYNE_LLM_MODEL=${MNEMOSYNE_LLM_MODEL:-deepseek-v4-flash}
    networks:
      - aether-net
      - internal
    depends_on:
      - huginn-gateway
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Router for Huginn Dashboard (Port 9119)
        - "traefik.http.routers.huginn-dashboard.rule=Host(`huginn.${DOMAIN_NAME}`)"
        - "traefik.http.routers.huginn-dashboard.entrypoints=websecure"
        - "traefik.http.routers.huginn-dashboard.tls=true"
        - "traefik.http.routers.huginn-dashboard.tls.certresolver=cloudflare"
        - "traefik.http.routers.huginn-dashboard.middlewares=authelia"
        - "traefik.http.routers.huginn-dashboard.service=huginn-dashboard"
        - "traefik.http.services.huginn-dashboard.loadbalancer.server.port=9120"
        - "traefik.docker.network=aether-net"
        - "homepage.group=Odin"
        - "homepage.name=Huginn Dashboard"
        - "homepage.icon=hermes.png"
        - "homepage.href=https://huginn.${DOMAIN_NAME}"
        - "homepage.description=Hermes Agent Web UI"

  mnemosyne-dashboard:
    image: ${REGISTRY_PREFIX}mnemosyne-dashboard:${STACK_NAME:-latest}
    build:
      context: ./mnemosyne-dashboard
      dockerfile: Dockerfile
    volumes:
      # Mount the Mnemosyne host directory as read-only for database visualization
      - /opt/odin/mnemosyne:/opt/data:ro
    environment:
      - MNEMOSYNE_DASHBOARD_PORT=8080
      - MNEMOSYNE_DASHBOARD_DB=/opt/data/data/mnemosyne.db
      - MNEMOSYNE_DASHBOARD_HOST=0.0.0.0
      - TZ=Pacific/Auckland
    networks:
      - aether-net
      - internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mnemosyne-db.rule=Host(`mnemosyne.${DOMAIN_NAME}`)"
        - "traefik.http.routers.mnemosyne-db.entrypoints=websecure"
        - "traefik.http.routers.mnemosyne-db.tls=true"
        - "traefik.http.routers.mnemosyne-db.tls.certresolver=cloudflare"
        - "traefik.http.services.mnemosyne-db.loadbalancer.server.port=8080"
        - "traefik.docker.network=aether-net"
        - "homepage.group=Odin"
        - "homepage.name=Mnemosyne Dashboard"
        - "homepage.icon=brain.png"
        - "homepage.href=https://mnemosyne.${DOMAIN_NAME}"
        - "homepage.description=Memory Store Visualizer & Event Inspector"

  searxng:
    image: searxng/searxng:latest
    volumes:
      - searxng_data:/etc/searxng
    configs:
      - source: searxng_settings
        target: /etc/searxng/settings.yml
      - source: searxng_limiter
        target: /etc/searxng/limiter.toml
    environment:
      - TZ=Pacific/Auckland
    networks:
      - internal
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  camofox:
    image: ghcr.io/redf0x1/camofox-browser:latest
    volumes:
      - camofox_data:/root/.camofox
    environment:
      - TZ=Pacific/Auckland
      - CAMOFOX_HOST=0.0.0.0
      - CAMOFOX_PORT=9377
      - CAMOFOX_AUTH_MODE=disabled
      - CAMOFOX_IDLE_TIMEOUT_MS=86400000
      - CAMOFOX_IDLE_EXIT_TIMEOUT_MS=86400000
    networks:
      - internal
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  huginn-backup:
    image: alpine:latest
    container_name: huginn-backup
    restart: always
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    entrypoint: ["sh", "-c", "apk add --no-cache sqlite tzdata && echo \"Running initial backup...\" && sh /config/backup.sh && echo \"Initial backup complete. Setting up daily cron...\" && echo \"0 3 * * * sh /config/backup.sh >> /var/log/huginn-backup.log 2>&1\" | crontab - && echo \"Starting crond...\" && exec crond -f -l 2"]
    volumes:
      - /opt/odin/hermes:/data/hermes
      - /opt/odin/mnemosyne:/data/mnemosyne
      - /mnt/storage/backups/odin/hermes:/backup
    configs:
      - source: huginn_backup_script
        target: /config/backup.sh
    environment:
      - TZ=Pacific/Auckland
      - BACKUP_KEEP_DAYS=30
    depends_on:
      - huginn-gateway
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  odin-git-backup:
    image: ${REGISTRY_PREFIX}odin-git-backup:${STACK_NAME:-latest}
    build:
      context: ./git-backup
      dockerfile: Dockerfile
    working_dir: /git
    entrypoint: /bin/sh
    command: -c '
        echo "Running initial backup...";
        /usr/local/bin/git-backup.sh;
        echo "Initial backup complete. Setting up daily cron...";
        echo "0 3 * * * /usr/local/bin/git-backup.sh >> /var/log/git-backup.log 2>&1" | crontab -;
        echo "Starting crond...";
        crond -f -l 2
      '
    environment:
      - GIT_REPO_URL=${ODIN_GIT_REPO_URL}
      - GIT_USER_EMAIL=${ODIN_GIT_USER_EMAIL}
      - GIT_USER_NAME=${ODIN_GIT_USER_NAME}
    secrets:
      - source: hermes_ssh_key
        target: odin_git_backup_ssh_key
    volumes:
      - /opt/odin:/git
    networks:
      - internal
    labels:
      - "com.docker.compose.project=${STACK_NAME}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  ollama_data:
  open-webui_data:
  muninn-db_data:
  searxng_data:
  camofox_data:

networks:
  aether-net:
    external: true
  internal:
    driver: overlay
    attachable: true

configs:
  huginn_backup_script:
    file: ./config/hermes-backup/backup.sh
  ollama_init_script:
    file: ./config/ollama-init/init.sh
  muninn_config:
    file: ./config/muninn/config.yaml
  searxng_settings:
    file: ./config/searxng/settings.yml
  searxng_limiter:
    file: ./config/searxng/limiter.toml
secrets:
  odin_lldap_user_pass:
    external: true
    name: ${LLDAP_LDAP_USER_PASS_NAME}
  hermes_ssh_key:
    external: true
    name: ${HERMES_SSH_KEY_NAME}
  odin_webui_secret_key:
    external: true
    name: ${WEBUI_SECRET_KEY_NAME}
